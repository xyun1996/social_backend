syntax = "proto3";

package social_backend.ops.v1;

option go_package = "github.com/xyun1996/social_backend/api/proto/ops/v1;opsv1";

message PresenceRecord {
  string player_id = 1;
  string status = 2;
  string session_id = 3;
  string realm_id = 4;
  string location = 5;
  string last_heartbeat_at = 6;
  string last_seen_at = 7;
  string connected_at = 8;
  string disconnected_at = 9;
}

message SocialSnapshot {
  string player_id = 1;
  repeated string friends = 2;
  repeated string blocks = 3;
  repeated string pending_inbox = 4;
  repeated string pending_outbox = 5;
}

message PlayerOverview {
  string player_id = 1;
  PresenceRecord presence = 2;
  repeated string friends = 3;
  repeated string blocks = 4;
  repeated string pending_inbox = 5;
  repeated string pending_outbox = 6;
  int32 friend_count = 7;
  int32 block_count = 8;
  int32 pending_inbox_count = 9;
  int32 pending_outbox_count = 10;
}

message PartyMemberState {
  string player_id = 1;
  bool is_leader = 2;
  bool is_ready = 3;
  string presence = 4;
  string session_id = 5;
  string realm_id = 6;
  string location = 7;
}

message GuildMemberState {
  string player_id = 1;
  string role = 2;
  string presence = 3;
  string session_id = 4;
  string realm_id = 5;
  string location = 6;
}

message PartySnapshot {
  string party_id = 1;
  int32 count = 2;
  repeated PartyMemberState members = 3;
}

message GuildSnapshot {
  string guild_id = 1;
  int32 count = 2;
  repeated GuildMemberState members = 3;
}

message WorkerJob {
  string id = 1;
  string type = 2;
  string payload = 3;
  string status = 4;
  int32 attempts = 5;
  string last_error = 6;
  string claimed_by = 7;
  string created_at = 8;
  string claimed_at = 9;
  string completed_at = 10;
}

message WorkerSnapshot {
  string status = 1;
  string type = 2;
  int32 count = 3;
  repeated WorkerJob jobs = 4;
}

message MySQLBootstrapService {
  string service = 1;
  int32 count = 2;
  repeated string migration_ids = 3;
}

message MySQLBootstrapSnapshot {
  int32 count = 1;
  repeated MySQLBootstrapService services = 2;
}

message RedisWorkerStatusCount {
  string status = 1;
  int32 count = 2;
}

message RedisRuntimeSnapshot {
  string redis_url = 1;
  int32 presence_record_count = 2;
  int32 gateway_session_count = 3;
  int32 worker_job_count = 4;
  repeated RedisWorkerStatusCount worker_status_counters = 5;
}

message DurableSummary {
  MySQLBootstrapSnapshot mysql = 1;
  RedisRuntimeSnapshot redis = 2;
}

message GetPlayerPresenceRequest {
  string player_id = 1;
}

message GetPartySnapshotRequest {
  string party_id = 1;
}

message GetGuildSnapshotRequest {
  string guild_id = 1;
}

message GetPlayerOverviewRequest {
  string player_id = 1;
}

message GetWorkerSnapshotRequest {
  string status = 1;
  string type = 2;
}

message GetMySQLBootstrapSnapshotRequest {}

message GetRedisRuntimeSnapshotRequest {}

message GetDurableSummaryRequest {}

service OpsService {
  rpc GetPlayerPresence(GetPlayerPresenceRequest) returns (PresenceRecord);
  rpc GetPlayerOverview(GetPlayerOverviewRequest) returns (PlayerOverview);
  rpc GetPartySnapshot(GetPartySnapshotRequest) returns (PartySnapshot);
  rpc GetGuildSnapshot(GetGuildSnapshotRequest) returns (GuildSnapshot);
  rpc GetWorkerSnapshot(GetWorkerSnapshotRequest) returns (WorkerSnapshot);
  rpc GetMySQLBootstrapSnapshot(GetMySQLBootstrapSnapshotRequest) returns (MySQLBootstrapSnapshot);
  rpc GetRedisRuntimeSnapshot(GetRedisRuntimeSnapshotRequest) returns (RedisRuntimeSnapshot);
  rpc GetDurableSummary(GetDurableSummaryRequest) returns (DurableSummary);
}
